<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #090b0e; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    font-family: 'JetBrains Mono','Fira Code',monospace; }
  .viewer { position: relative; flex: 1; display: flex;
    align-items: center; justify-content: center; background: #090b0e; }
  img#feed { width: 100%; height: 100%; object-fit: contain; display: none; }
  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; }
  .connect-btn { background: rgba(0,229,160,0.12); border: 1px solid #00e5a0;
    border-radius: 8px; color: #00e5a0; font-family: inherit; font-size: 12px;
    font-weight: 600; letter-spacing: 0.08em; padding: 9px 24px; cursor: pointer;
    text-transform: uppercase; transition: background 0.15s; }
  .connect-btn:hover { background: rgba(0,229,160,0.22); }
  .connect-btn.disconnect { border-color: #ff5c5c; color: #ff5c5c; background: rgba(255,92,92,0.12); }
  .connect-btn.disconnect:hover { background: rgba(255,92,92,0.22); }
  .status-msg { font-size: 10px; color: #7a8494; letter-spacing: 0.04em; display: none; }
  .live-badge { position: absolute; top: 10px; left: 10px; font-size: 10px;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 8px;
    border-radius: 4px; background: rgba(0,229,160,0.2); border: 1px solid rgba(0,229,160,0.4);
    color: #00e5a0; display: none; align-items: center; gap: 5px; backdrop-filter: blur(6px); }
  .live-badge.visible { display: flex; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #00e5a0;
    animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
</style>
</head>
<body>

<div class="viewer">
  <img id="feed" alt="camera feed" />
  <div class="overlay" id="overlay">
    <button class="connect-btn" id="btn" onclick="toggle()">Connect Camera</button>
    <span class="status-msg" id="msg"></span>
  </div>
  <div class="live-badge" id="live"><div class="dot"></div> LIVE</div>
</div>

<script>
const RELAY_URL = 'relay.php';

let active = false, lastSeq = 0;
let retryTimer = null, fetchController = null;

const btn      = document.getElementById('btn');
const overlay  = document.getElementById('overlay');
const feed     = document.getElementById('feed');
const msg      = document.getElementById('msg');
const liveBadge = document.getElementById('live');

function setMsg(text) { msg.style.display = text ? 'block' : 'none'; msg.textContent = text; }

function toggle() { if (active) stop(); else start(); }

function start() {
  active = true; lastSeq = 0;
  btn.textContent = 'Disconnect';
  btn.className = 'connect-btn disconnect';
  setMsg('Waiting for host…');
  fetchNext();
}

async function fetchNext() {
  if (!active) return;
  const url = RELAY_URL + '?action=pull&since=' + lastSeq;
  try {
    fetchController = new AbortController();
    const r = await fetch(url, { signal: fetchController.signal, cache: 'no-store' });

    if (!r.ok) {
      setMsg('Waiting for host to start streaming…');
      retryTimer = setTimeout(fetchNext, 1000);
      return;
    }

    const seq  = parseInt(r.headers.get('X-Frame-Seq') || '0', 10);
    const blob = await r.blob();
    const objUrl = URL.createObjectURL(blob);

    if (feed._objUrl) URL.revokeObjectURL(feed._objUrl);
    feed._objUrl = objUrl;
    feed.src = objUrl;
    feed.style.display = 'block';

    // Hide overlay once we have the first frame
    overlay.style.background = 'transparent';
    overlay.style.pointerEvents = 'none';
    btn.style.pointerEvents = 'auto';
    liveBadge.classList.add('visible');
    setMsg('');

    lastSeq = seq;
    fetchNext();

  } catch(e) {
    if (!active || e.name === 'AbortError') return;
    setMsg('Connection error — retrying…');
    retryTimer = setTimeout(fetchNext, 2000);
  }
}

function stop() {
  active = false;
  if (fetchController) { fetchController.abort(); fetchController = null; }
  if (retryTimer)      { clearTimeout(retryTimer); retryTimer = null; }
  if (feed._objUrl)    { URL.revokeObjectURL(feed._objUrl); feed._objUrl = null; }
  feed.src = ''; feed.style.display = 'none';
  overlay.style.background = '';
  overlay.style.pointerEvents = '';
  btn.style.pointerEvents = '';
  liveBadge.classList.remove('visible');
  btn.textContent = 'Connect Camera';
  btn.className = 'connect-btn';
  setMsg('');
}
</script>
</body>
</html>
