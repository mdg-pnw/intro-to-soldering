<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WS Camera — Host (Relay)</title>
<style>
  :root {
    --bg: #0d0f12; --surface: #161a20; --surface2: #1e242d;
    --border: rgba(255,255,255,0.08);
    --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
    --text: #eef0f3; --text-muted: #7a8494;
    --danger: #ff5c5c; --danger-dim: rgba(255,92,92,0.12);
    --warn: #f5a623; --warn-dim: rgba(245,166,35,0.12);
    --radius: 8px; --font: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font);
    font-size: 13px; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 1.5rem 1rem; gap: 12px; }
  header { width: 100%; max-width: 600px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; border-radius: 8px; background: var(--warn-dim);
    border: 1px solid var(--warn); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; }
  .logo svg { width: 18px; height: 18px; stroke: var(--warn); fill: none; stroke-width: 1.8; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
  .tagline { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .card { width: 100%; max-width: 600px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .section { padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px; }
  .section:last-child { border-bottom: none; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
  .field label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  input, select { background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font);
    font-size: 13px; padding: 8px 10px; outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus, select:focus { border-color: var(--warn); }
  .btn { border-radius: var(--radius); font-family: var(--font); font-size: 12px;
    font-weight: 600; letter-spacing: 0.06em; padding: 9px 20px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; border: 1px solid; text-transform: uppercase; }
  .btn-host { background: var(--warn-dim); border-color: var(--warn); color: var(--warn); width: 100%; }
  .btn-host:hover { background: rgba(245,166,35,0.22); }
  .btn-host.active { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
  .preview-wrap { position: relative; background: #090b0e; aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #preview { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
  #preview.no-mirror { transform: none; }
  .placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px;
    color: var(--text-muted); text-align: center; padding: 20px; }
  .placeholder svg { width: 40px; height: 40px; stroke: currentColor; fill: none; stroke-width: 1.2; opacity: 0.4; }
  .placeholder p { font-size: 11px; opacity: 0.6; line-height: 1.6; }
  .hud { position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; justify-content: space-between; pointer-events: none;
    opacity: 0; transition: opacity 0.2s; }
  .hud.visible { opacity: 1; }
  .badge { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 8px; border-radius: 4px; backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 5px; }
  .badge.on-air { background: rgba(245,166,35,0.25); border: 1px solid rgba(245,166,35,0.5); color: var(--warn); }
  .badge.info { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12); color: var(--text-muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.25} }
  .flip-btn { position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; color: var(--text-muted); font-family: var(--font);
    font-size: 10px; padding: 5px 10px; cursor: pointer; text-transform: uppercase;
    letter-spacing: 0.05em; display: none; }
  .flip-btn.visible { display: block; }
  .stats { font-size: 10px; color: var(--text-muted); letter-spacing: 0.02em; }
  .stats span { color: var(--text); }
  .status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--surface2); }
  .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    flex-shrink: 0; transition: background 0.3s; }
  .sdot.connecting { background: var(--warn); animation: pulse 0.8s infinite; }
  .sdot.streaming { background: var(--warn); }
  .sdot.error { background: var(--danger); }
  #status-text { font-size: 11px; color: var(--text-muted); flex: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
  </div>
  <h1>WS Camera <span style="color:var(--warn);font-weight:400">/ Host · Relay</span></h1>
  <span class="tagline">PHP frame relay</span>
</header>

<div class="card">
  <div class="section">
    <div class="row">
      <div class="field">
        <label>Relay URL</label>
        <input id="relay-url" type="url" placeholder="https://yourdomain.com/relay.php" />
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Camera</label>
        <select id="cam-select"><option value="">Loading…</option></select>
      </div>
      <div class="field" style="max-width:100px">
        <label>Quality</label>
        <select id="quality">
          <option value="0.85">High</option>
          <option value="0.70" selected>Medium</option>
          <option value="0.50">Low</option>
        </select>
      </div>
      <div class="field" style="max-width:100px">
        <label>FPS target</label>
        <select id="fps">
          <option value="24">24 fps</option>
          <option value="15" selected>15 fps</option>
          <option value="10">10 fps</option>
          <option value="5">5 fps</option>
        </select>
      </div>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      <p>Enter the relay URL above,<br>then tap Start to begin streaming.</p>
    </div>
    <video id="preview" autoplay muted playsinline></video>
    <div class="hud" id="hud">
      <div class="badge on-air"><div class="dot"></div> ON AIR</div>
      <div class="badge info" id="fps-badge">— fps</div>
    </div>
    <button class="flip-btn" id="flip-btn" onclick="flipCamera()">⟳ flip</button>
  </div>

  <div class="section">
    <button class="btn btn-host" id="host-btn" onclick="toggleHost()">Start Streaming</button>
    <div class="stats" id="stats" style="display:none">
      Sent <span id="stat-frames">0</span> frames &nbsp;·&nbsp;
      <span id="stat-fps">—</span> fps &nbsp;·&nbsp;
      avg <span id="stat-size">—</span> KB/frame &nbsp;·&nbsp;
      <span id="stat-errors">0</span> errors
    </div>
  </div>

  <div class="status-bar">
    <div class="sdot" id="sdot"></div>
    <span id="status-text">Idle — enter relay URL and tap Start</span>
  </div>
</div>

<script>
const RELAY_URL_KEY = 'wscam-relay-url';

let stream = null, captureCanvas = null, captureCtx = null;
let sendTimer = null, active = false, facingMode = 'environment';
let frameCount = 0, errorCount = 0, totalBytes = 0;
let fpsFrames = 0, lastFpsTime = performance.now();
let sending = false; // prevent overlapping POSTs

function relayUrl() { return document.getElementById('relay-url').value.trim(); }

function setStatus(state, msg) {
  document.getElementById('sdot').className = 'sdot' + (state ? ' '+state : '');
  document.getElementById('status-text').textContent = msg;
}

// ── Camera list ────────────────────────────────────────────────────────────
async function loadCameras() {
  const sel = document.getElementById('cam-select');
  sel.innerHTML = '<option value="">Default camera</option>';
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true });
    tmp.getTracks().forEach(t => t.stop());
    const devs = await navigator.mediaDevices.enumerateDevices();
    devs.filter(d => d.kind === 'videoinput').forEach((d, i) => {
      const o = document.createElement('option');
      o.value = d.deviceId;
      o.textContent = d.label || ('Camera ' + (i+1));
      if (d.label && /back|rear|environment/i.test(d.label)) o.selected = true;
      sel.appendChild(o);
    });
  } catch(e) { /* permission not granted yet, default option remains */ }
}

async function flipCamera() {
  if (!active || !stream) return;
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode } }).catch(() => null);
  if (!newStream) return;
  stream.getTracks().forEach(t => t.stop());
  stream = newStream;
  document.getElementById('preview').srcObject = newStream;
  document.getElementById('preview').classList.toggle('no-mirror', facingMode === 'environment');
}

// ── Host flow ──────────────────────────────────────────────────────────────
async function toggleHost() {
  if (active) { stopHost(); return; }
  if (!relayUrl()) { setStatus('error', 'Enter the relay URL first'); return; }
  await startHost();
}

async function startHost() {
  setStatus('connecting', 'Requesting camera…');

  const deviceId = document.getElementById('cam-select').value;
  const constraints = {
    video: {
      width: { ideal: 1280 }, height: { ideal: 720 },
      ...(deviceId ? { deviceId: { exact: deviceId } } : { facingMode }),
    },
    audio: false,
  };

  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch(e) {
    setStatus('error', 'Camera denied: ' + e.message);
    return;
  }

  const preview = document.getElementById('preview');
  preview.srcObject = stream;
  preview.style.display = 'block';
  preview.classList.toggle('no-mirror', facingMode === 'environment');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('flip-btn').classList.add('visible');
  document.getElementById('hud').classList.add('visible');

  // Set up offscreen canvas sized to actual camera output
  await new Promise(r => preview.onloadedmetadata = r);
  const vw = preview.videoWidth, vh = preview.videoHeight;
  captureCanvas = document.createElement('canvas');
  captureCanvas.width  = vw;
  captureCanvas.height = vh;
  captureCtx = captureCanvas.getContext('2d', { alpha: false });

  active = true;
  frameCount = errorCount = totalBytes = fpsFrames = 0;
  lastFpsTime = performance.now();
  document.getElementById('host-btn').textContent = 'Stop Streaming';
  document.getElementById('host-btn').classList.add('active');
  document.getElementById('stats').style.display = 'block';
  setStatus('streaming', 'Streaming…');

  const fps = parseInt(document.getElementById('fps').value, 10);
  const interval = Math.round(1000 / fps);
  sendTimer = setInterval(sendFrame, interval);
}

async function sendFrame() {
  if (!active || sending) return;
  sending = true;

  const quality = parseFloat(document.getElementById('quality').value);
  const preview = document.getElementById('preview');

  captureCtx.drawImage(preview, 0, 0);

  captureCanvas.toBlob(async (blob) => {
    if (!blob) { sending = false; return; }

    try {
      const r = await fetch(relayUrl() + '?action=push', {
        method: 'POST',
        headers: {
          'Content-Type': 'image/jpeg',
          'X-Frame-W': captureCanvas.width,
          'X-Frame-H': captureCanvas.height,
        },
        body: blob,
      });

      if (r.ok) {
        frameCount++;
        totalBytes += blob.size;
        fpsFrames++;

        const now = performance.now();
        if (now - lastFpsTime >= 1000) {
          const fps = (fpsFrames / ((now - lastFpsTime) / 1000)).toFixed(1);
          document.getElementById('fps-badge').textContent = fps + ' fps';
          document.getElementById('stat-fps').textContent = fps + ' fps';
          fpsFrames = 0;
          lastFpsTime = now;
        }

        document.getElementById('stat-frames').textContent = frameCount;
        document.getElementById('stat-size').textContent =
          (totalBytes / frameCount / 1024).toFixed(1);
      } else {
        errorCount++;
        document.getElementById('stat-errors').textContent = errorCount;
      }
    } catch(e) {
      errorCount++;
      document.getElementById('stat-errors').textContent = errorCount;
      // Don't stop on network hiccup — just keep trying
    }

    sending = false;
  }, 'image/jpeg', quality);
}

function stopHost() {
  active = false;
  if (sendTimer) { clearInterval(sendTimer); sendTimer = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

  document.getElementById('preview').srcObject = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('flip-btn').classList.remove('visible');
  document.getElementById('host-btn').textContent = 'Start Streaming';
  document.getElementById('host-btn').classList.remove('active');
  document.getElementById('stats').style.display = 'none';
  document.getElementById('fps-badge').textContent = '— fps';
  setStatus('', 'Stopped');

  // Tell server stream is over
  fetch(relayUrl() + '?action=stop', { method: 'POST' }).catch(() => {});
}

// ── Persist URL ────────────────────────────────────────────────────────────
const saved = localStorage.getItem(RELAY_URL_KEY);
if (saved) document.getElementById('relay-url').value = saved;
document.getElementById('relay-url').addEventListener('change', () =>
  localStorage.setItem(RELAY_URL_KEY, relayUrl()));

const params = new URLSearchParams(location.search);
if (params.get('relay')) document.getElementById('relay-url').value = params.get('relay');

loadCameras();
</script>
</body>
</html>
