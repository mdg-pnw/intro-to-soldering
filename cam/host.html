<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WS Camera — Host</title>
<style>
  :root {
    --bg: #0d0f12; --surface: #161a20; --surface2: #1e242d;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.18);
    --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
    --text: #eef0f3; --text-muted: #7a8494;
    --danger: #ff5c5c; --danger-dim: rgba(255,92,92,0.12);
    --warn: #f5a623; --warn-dim: rgba(245,166,35,0.12);
    --radius: 8px; --font: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 1.5rem 1rem; gap: 12px; }
  header { width: 100%; max-width: 640px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; border-radius: 8px; background: var(--warn-dim);
    border: 1px solid var(--warn); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 18px; height: 18px; stroke: var(--warn); fill: none; stroke-width: 1.8; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
  .tagline { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .card { width: 100%; max-width: 640px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .section { padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px; }
  .section:last-child { border-bottom: none; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
  .field label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  input, select { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 10px;
    outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus, select:focus { border-color: var(--warn); }
  .btn { border-radius: var(--radius); font-family: var(--font); font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; padding: 9px 20px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap; border: 1px solid; text-transform: uppercase; }
  .btn-host { background: var(--warn-dim); border-color: var(--warn); color: var(--warn); width: 100%; }
  .btn-host:hover { background: rgba(245,166,35,0.22); }
  .btn-host.active { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
  .btn-sm { font-size: 10px; padding: 5px 10px; background: transparent;
    border-color: var(--border); color: var(--text-muted); }
  .btn-sm:hover { border-color: var(--warn); color: var(--warn); }
  .preview-wrap { position: relative; background: #090b0e; aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #preview { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
  #preview.no-mirror { transform: none; }
  .placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px;
    color: var(--text-muted); text-align: center; padding: 20px; }
  .placeholder svg { width: 40px; height: 40px; stroke: currentColor; fill: none; stroke-width: 1.2; opacity: 0.4; }
  .placeholder p { font-size: 11px; opacity: 0.6; line-height: 1.6; }
  .hud { position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; justify-content: space-between; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .hud.visible { opacity: 1; }
  .badge { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 8px; border-radius: 4px; backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 5px; }
  .badge.on-air { background: rgba(245,166,35,0.25); border: 1px solid rgba(245,166,35,0.5); color: var(--warn); }
  .badge.conn { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12); color: var(--text-muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.25} }
  .camera-flip-btn { position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
    color: var(--text-muted); font-family: var(--font); font-size: 10px; letter-spacing: 0.05em;
    padding: 5px 10px; cursor: pointer; text-transform: uppercase; display: none; }
  .camera-flip-btn.visible { display: block; }

  /* ── Diagnostic log ── */
  .log-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted);
    user-select: none; background: none; border: none; font-family: var(--font); padding: 0; }
  .log-toggle:hover { color: var(--text); }
  .log-toggle .chevron { display: inline-block; transition: transform 0.2s; font-style: normal; }
  .log-toggle.open .chevron { transform: rotate(90deg); }
  .log-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .log-clear { font-size: 10px; padding: 2px 8px; background: transparent;
    border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted);
    font-family: var(--font); cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; }
  .log-clear:hover { border-color: var(--danger); color: var(--danger); }
  .log-header { display: flex; align-items: center; }
  .log-body { display: none; margin-top: 8px; }
  .log-body.open { display: block; }
  .log { font-size: 10.5px; color: var(--text-muted); line-height: 1.75;
    letter-spacing: 0.01em; height: 200px; overflow-y: auto;
    background: var(--bg); border-radius: var(--radius);
    padding: 10px 12px; border: 1px solid var(--border); font-family: var(--font); }
  .log .ts { color: #3a4250; margin-right: 6px; user-select: none; }
  .log .ok   { color: var(--accent); }
  .log .warn { color: var(--warn); }
  .log .err  { color: var(--danger); }
  .log .dim  { color: #4a5568; }
  .log .ice-host  { color: #60a5fa; }
  .log .ice-srflx { color: #a78bfa; }
  .log .ice-relay { color: #f472b6; }

  .status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--surface2); }
  .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    flex-shrink: 0; transition: background 0.3s; }
  .sdot.connecting { background: var(--warn); animation: pulse 0.8s infinite; }
  .sdot.connected  { background: var(--accent); }
  .sdot.streaming  { background: var(--warn); }
  .sdot.error      { background: var(--danger); }
  #status-text { font-size: 11px; color: var(--text-muted); flex: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
  </div>
  <h1>WS Camera <span style="color:var(--warn);font-weight:400">/ Host</span></h1>
  <span class="tagline">presentation camera</span>
</header>

<div class="card">
  <div class="section">
    <div class="row">
      <div class="field">
        <label>Signal server URL</label>
        <input id="signal-url" type="url" placeholder="https://yourdomain.com/signal.php" />
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Camera</label>
        <select id="cam-select"><option value="">Loading…</option></select>
      </div>
      <div class="field" style="max-width:110px">
        <label>Resolution</label>
        <select id="res-select">
          <option value="1280x720">720p</option>
          <option value="1920x1080">1080p</option>
          <option value="640x480">480p</option>
        </select>
      </div>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      <p>Configure the signal URL above,<br>then tap Start to begin streaming.</p>
    </div>
    <video id="preview" autoplay muted playsinline></video>
    <div class="hud" id="hud">
      <div class="badge on-air"><div class="dot"></div> ON AIR</div>
      <div class="badge conn" id="conn-badge">no viewers</div>
    </div>
    <button class="camera-flip-btn" id="flip-btn" onclick="flipCamera()">⟳ flip</button>
  </div>

  <div class="section">
    <button class="btn btn-host" id="host-btn" onclick="toggleHost()">Start Streaming</button>
    <div class="log-header">
      <button class="log-toggle" id="log-toggle" onclick="toggleLog()">
        <span class="chevron">▶</span> Diagnostic log
      </button>
      <div class="log-actions">
        <button class="log-clear" onclick="clearLog()">Clear</button>
      </div>
    </div>
    <div class="log-body" id="log-body">
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="sdot" id="sdot"></div>
    <span id="status-text">Idle — enter signal URL and tap Start</span>
  </div>
</div>

<script>
const POLL_MS   = 1500;
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
];

let pc = null, localStream = null, pollTimer = null;
let iceIndex = 0, hosting = false, gotAnswer = false;
let facingMode = 'environment';

// ── Logging ────────────────────────────────────────────────────────────────
function ts() {
  const d = new Date();
  return d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}
function log(msg, cls='') {
  const el = document.getElementById('log');
  const row = document.createElement('div');
  const stamp = document.createElement('span');
  stamp.className = 'ts'; stamp.textContent = ts();
  row.appendChild(stamp);
  if (cls) row.classList.add(cls);
  row.appendChild(document.createTextNode(msg));
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }
function toggleLog() {
  const toggle = document.getElementById('log-toggle');
  const body   = document.getElementById('log-body');
  const open   = body.classList.toggle('open');
  toggle.classList.toggle('open', open);
  if (open) body.querySelector('.log').scrollTop = body.querySelector('.log').scrollHeight;
}

// Classify an ICE candidate string and return a css class + label
function iceInfo(candidateStr) {
  if (!candidateStr) return { cls: 'dim', label: 'null/end-of-candidates' };
  const parts = candidateStr.split(' ');
  const type = parts[7]; // 'host', 'srflx', 'relay', 'prflx'
  const addr = parts[4] || '?';
  const port = parts[5] || '?';
  const proto = parts[2] || '?';
  const cls = type === 'host' ? 'ice-host' : type === 'srflx' ? 'ice-srflx' : type === 'relay' ? 'ice-relay' : 'dim';
  return { cls, label: `[${type}] ${proto} ${addr}:${port}` };
}

function setStatus(state, msg) {
  document.getElementById('sdot').className = 'sdot' + (state ? ' '+state : '');
  document.getElementById('status-text').textContent = msg;
}

// ── Signal server ──────────────────────────────────────────────────────────
function signalUrl() { return document.getElementById('signal-url').value.trim(); }

async function signal(action, body={}) {
  const base = signalUrl();
  if (!base) throw new Error('No signal URL configured');
  const url = base + '?action=' + encodeURIComponent(action);
  log('→ POST signal/' + action, 'dim');
  let r;
  try {
    r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
  } catch(e) {
    log('  fetch error: ' + e.message, 'err');
    throw e;
  }
  if (!r.ok) {
    const txt = await r.text().catch(() => '(unreadable)');
    log(`  HTTP ${r.status}: ${txt.slice(0,120)}`, 'err');
    throw new Error('HTTP ' + r.status);
  }
  const data = await r.json().catch(async e => {
    log('  JSON parse error: ' + e.message, 'err');
    throw e;
  });
  log('← ' + JSON.stringify(data).slice(0, 160), data.ok === false ? 'err' : 'dim');
  return data;
}

// ── Camera list ────────────────────────────────────────────────────────────
async function loadCameras() {
  const sel = document.getElementById('cam-select');
  sel.innerHTML = '<option value="">Default camera</option>';
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true });
    tmp.getTracks().forEach(t => t.stop());
    const devs = await navigator.mediaDevices.enumerateDevices();
    devs.filter(d => d.kind === 'videoinput').forEach((d, i) => {
      const o = document.createElement('option');
      o.value = d.deviceId;
      o.textContent = d.label || ('Camera ' + (i+1));
      if (d.label && /back|rear|environment/i.test(d.label)) o.selected = true;
      sel.appendChild(o);
    });
    log('Found ' + sel.options.length + ' camera(s)', 'ok');
  } catch(e) {
    log('Camera enum failed: ' + e.message, 'warn');
  }
}

async function flipCamera() {
  if (!hosting || !localStream) return;
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  const [w,h] = document.getElementById('res-select').value.split('x').map(Number);
  try {
    const ns = await navigator.mediaDevices.getUserMedia({ video: { facingMode, width:{ideal:w}, height:{ideal:h} } });
    const nt = ns.getVideoTracks()[0];
    const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
    if (sender) await sender.replaceTrack(nt);
    localStream.getVideoTracks().forEach(t => t.stop());
    localStream = ns;
    document.getElementById('preview').srcObject = ns;
    document.getElementById('preview').classList.toggle('no-mirror', facingMode === 'environment');
    log('Camera flipped to ' + facingMode, 'ok');
  } catch(e) { log('Flip failed: ' + e.message, 'err'); }
}

// ── Host flow ──────────────────────────────────────────────────────────────
async function toggleHost() {
  if (hosting) { stopHost(); return; }
  if (!signalUrl()) { log('Enter the signal server URL first.', 'err'); return; }
  await startHost();
}

async function startHost() {
  log('=== Starting host session ===');
  setStatus('connecting', 'Requesting camera…');

  const [w,h] = document.getElementById('res-select').value.split('x').map(Number);
  const deviceId = document.getElementById('cam-select').value;
  log('Camera deviceId: ' + (deviceId || 'default') + '  res: ' + w + 'x' + h);

  const constraints = {
    video: {
      width:{ideal:w}, height:{ideal:h},
      ...(deviceId ? { deviceId:{exact:deviceId} } : { facingMode }),
    },
    audio: false,
  };
  log('getUserMedia constraints: ' + JSON.stringify(constraints), 'dim');

  try {
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    const t = localStream.getVideoTracks()[0];
    const s = t.getSettings();
    log('Camera acquired: ' + t.label + ' @ ' + s.width + 'x' + s.height + ' ' + (s.frameRate||'?') + 'fps', 'ok');
  } catch(e) {
    log('getUserMedia failed: ' + e.name + ': ' + e.message, 'err');
    setStatus('error', 'Camera access denied');
    return;
  }

  const preview = document.getElementById('preview');
  preview.srcObject = localStream;
  preview.style.display = 'block';
  preview.classList.toggle('no-mirror', facingMode === 'environment');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('flip-btn').classList.add('visible');

  // Reset signal server session
  log('Resetting signal server session…');
  try {
    await signal('reset');
    log('Signal server reset OK', 'ok');
  } catch(e) {
    log('Signal server unreachable — aborting.', 'err');
    setStatus('error', 'Cannot reach signal server');
    stopStream();
    return;
  }

  // Build peer connection
  log('Creating RTCPeerConnection with ' + ICE_SERVERS.length + ' STUN server(s)…');
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  localStream.getTracks().forEach(t => {
    pc.addTrack(t, localStream);
    log('Track added to PC: ' + t.kind + ' — ' + t.label, 'ok');
  });

  pc.onicecandidate = async ({ candidate }) => {
    if (!candidate) {
      log('ICE gathering complete (null candidate)', 'dim');
      return;
    }
    const info = iceInfo(candidate.candidate);
    log('Local ICE candidate: ' + info.label, info.cls);
    try {
      await signal('add_ice', {
        candidate: candidate.candidate,
        sdpMid: candidate.sdpMid,
        sdpMLineIndex: candidate.sdpMLineIndex,
        from: 'host',
      });
    } catch(e) {
      log('Failed to publish ICE candidate: ' + e.message, 'err');
    }
  };

  pc.onicegatheringstatechange = () => {
    log('ICE gathering state → ' + pc.iceGatheringState,
        pc.iceGatheringState === 'complete' ? 'ok' : 'dim');
  };

  pc.oniceconnectionstatechange = () => {
    log('ICE connection state → ' + pc.iceConnectionState,
        pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed' ? 'ok' :
        pc.iceConnectionState === 'failed' ? 'err' : 'dim');
  };

  pc.onsignalingstatechange = () => {
    log('Signaling state → ' + pc.signalingState, 'dim');
  };

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    log('Connection state → ' + s, s === 'connected' ? 'ok' : s === 'failed' ? 'err' : 'dim');
    if (s === 'connected') {
      setStatus('streaming', 'Streaming — viewer connected');
      document.getElementById('conn-badge').textContent = '1 viewer';
      document.getElementById('conn-badge').style.color = 'var(--accent)';
    } else if (s === 'disconnected' || s === 'failed') {
      setStatus('connecting', 'Viewer disconnected — waiting…');
      document.getElementById('conn-badge').textContent = 'no viewers';
      document.getElementById('conn-badge').style.color = '';
    }
  };

  // Create offer
  log('Creating SDP offer…');
  setStatus('connecting', 'Creating offer…');
  try {
    const offer = await pc.createOffer({ offerToReceiveVideo: false, offerToReceiveAudio: false });
    log('Offer created (' + offer.sdp.split('\n').length + ' SDP lines)', 'ok');
    await pc.setLocalDescription(offer);
    log('Local description set', 'ok');
    await signal('publish_offer', { sdp: offer.sdp, type: offer.type });
    log('Offer published to signal server', 'ok');
  } catch(e) {
    log('Offer creation failed: ' + e.name + ': ' + e.message, 'err');
    setStatus('error', 'Offer failed');
    cleanup();
    return;
  }

  hosting = true;
  gotAnswer = false;
  iceIndex = 0;
  document.getElementById('host-btn').textContent = 'Stop Streaming';
  document.getElementById('host-btn').classList.add('active');
  document.getElementById('hud').classList.add('visible');
  setStatus('connecting', 'Offer published — waiting for viewer…');

  log('Polling for answer every ' + POLL_MS + 'ms…', 'dim');
  pollTimer = setInterval(pollSignal, POLL_MS);
}

async function pollSignal() {
  if (!hosting) return;

  if (!gotAnswer) {
    try {
      const res = await signal('get_answer');
      if (res.ok && res.answer) {
        log('Answer received! type=' + res.answer.type + ', ' + res.answer.sdp.split('\n').length + ' SDP lines', 'ok');
        try {
          await pc.setRemoteDescription(new RTCSessionDescription(res.answer));
          log('Remote description set — ICE negotiation begins', 'ok');
          gotAnswer = true;
          setStatus('connecting', 'Answer set — waiting for ICE…');
        } catch(e) {
          log('setRemoteDescription failed: ' + e.name + ': ' + e.message, 'err');
        }
      }
    } catch(e) {
      // signal() already logged — skip
    }
  }

  // Poll for viewer ICE candidates
  try {
    const res = await signal('get_ice', { since: iceIndex, from: 'host' });
    if (res.ok && res.candidates && res.candidates.length) {
      log('Got ' + res.candidates.length + ' viewer ICE candidate(s)', 'ok');
      for (const c of res.candidates) {
        const info = iceInfo(c.candidate);
        log('Adding viewer ICE: ' + info.label, info.cls);
        try {
          await pc.addIceCandidate(new RTCIceCandidate(c));
          iceIndex = c.id + 1;
        } catch(e) {
          log('addIceCandidate failed: ' + e.message, 'err');
        }
      }
    }
  } catch(e) {
    // already logged
  }
}

function stopHost() {
  log('=== Stopping host ===');
  hosting = false; gotAnswer = false;
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  cleanup();
  document.getElementById('host-btn').textContent = 'Start Streaming';
  document.getElementById('host-btn').classList.remove('active');
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('flip-btn').classList.remove('visible');
  document.getElementById('preview').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('conn-badge').textContent = 'no viewers';
  document.getElementById('conn-badge').style.color = '';
  setStatus('', 'Stopped');
  try { signal('reset'); } catch(e) {}
}

function cleanup() {
  stopStream();
  if (pc) { pc.close(); pc = null; log('PeerConnection closed'); }
}

function stopStream() {
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('preview').srcObject = null;
}

// ── Init ──────────────────────────────────────────────────────────────────
loadCameras();
const params = new URLSearchParams(location.search);
if (params.get('signal')) document.getElementById('signal-url').value = params.get('signal');
log('Page loaded. User agent: ' + navigator.userAgent.slice(0,80), 'dim');
log('STUN: ' + ICE_SERVERS.map(s=>s.urls).join(', '), 'dim');
</script>
</body>
</html>
