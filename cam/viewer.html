<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS Camera — Viewer</title>
<style>
  :root {
    --bg: #0d0f12; --surface: #161a20; --surface2: #1e242d;
    --border: rgba(255,255,255,0.08);
    --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12); --accent-glow: rgba(0,229,160,0.25);
    --text: #eef0f3; --text-muted: #7a8494;
    --danger: #ff5c5c; --danger-dim: rgba(255,92,92,0.12);
    --warn: #f5a623; --warn-dim: rgba(245,166,35,0.12);
    --radius: 8px; --font: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem; gap: 12px; }
  header { width: 100%; max-width: 900px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .logo { width: 32px; height: 32px; border-radius: 8px; background: var(--accent-dim);
    border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
  .tagline { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .card { width: 100%; max-width: 900px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .connect-bar { display: flex; gap: 10px; padding: 16px; border-bottom: 1px solid var(--border);
    align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
  .field label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 10px;
    outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus { border-color: var(--accent); }
  .btn { border-radius: var(--radius); font-family: var(--font); font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; padding: 9px 22px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap; border: 1px solid; text-transform: uppercase; align-self: flex-end; }
  .btn-connect { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .btn-connect:hover { background: var(--accent-glow); }
  .btn-connect.active { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
  .viewer { position: relative; background: #090b0e; aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center; }
  #feed { width: 100%; height: 100%; object-fit: contain; display: none; background: #090b0e; }
  .placeholder { display: flex; flex-direction: column; align-items: center; gap: 16px;
    color: var(--text-muted); position: absolute; }
  .placeholder svg { width: 48px; height: 48px; stroke: currentColor; fill: none; stroke-width: 1.2; opacity: 0.4; }
  .placeholder p { font-size: 12px; letter-spacing: 0.04em; opacity: 0.6; text-align: center; line-height: 1.6; }
  .hud { position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .hud.visible { opacity: 1; }
  .badge { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 8px; border-radius: 4px; backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 5px; }
  .badge.live { background: rgba(0,229,160,0.2); border: 1px solid rgba(0,229,160,0.4); color: var(--accent); }
  .badge.info { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12); color: var(--text-muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.25} }

  /* ── Diagnostic log ── */
  .log-section { padding: 10px 16px; border-top: 1px solid var(--border);
    background: var(--surface2); }
  .log-header { display: flex; align-items: center; }
  .log-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted);
    user-select: none; background: none; border: none; font-family: var(--font); padding: 0; }
  .log-toggle:hover { color: var(--text); }
  .log-toggle .chevron { display: inline-block; transition: transform 0.2s; }
  .log-toggle.open .chevron { transform: rotate(90deg); }
  .log-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .log-clear { font-size: 10px; padding: 2px 8px; background: transparent;
    border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted);
    font-family: var(--font); cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; }
  .log-clear:hover { border-color: var(--danger); color: var(--danger); }
  .log-body { display: none; margin-top: 8px; }
  .log-body.open { display: block; }
  .log { font-size: 10.5px; color: var(--text-muted); line-height: 1.75;
    letter-spacing: 0.01em; height: 200px; overflow-y: auto;
    background: var(--bg); border-radius: var(--radius);
    padding: 10px 12px; border: 1px solid var(--border); }
  .log .ts { color: #3a4250; margin-right: 6px; user-select: none; }
  .log .ok   { color: var(--accent); }
  .log .warn { color: var(--warn); }
  .log .err  { color: var(--danger); }
  .log .dim  { color: #4a5568; }
  .log .ice-host  { color: #60a5fa; }
  .log .ice-srflx { color: #a78bfa; }
  .log .ice-relay { color: #f472b6; }

  .status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    background: var(--surface2); border-top: 1px solid var(--border); }
  .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    flex-shrink: 0; transition: background 0.3s; }
  .sdot.connecting { background: var(--warn); animation: pulse 0.8s infinite; }
  .sdot.connected  { background: var(--accent); }
  .sdot.error      { background: var(--danger); }
  #status-text { font-size: 11px; color: var(--text-muted); flex: 1; }
  #res-info { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </div>
  <h1>WS Camera <span style="color:var(--accent);font-weight:400">/ Viewer</span></h1>
  <span class="tagline">WebRTC live feed</span>
</header>

<div class="card">
  <div class="connect-bar">
    <div class="field">
      <label>Signal server URL</label>
      <input id="signal-url" type="url" placeholder="https://yourdomain.com/signal.php" />
    </div>
    <button class="btn btn-connect" id="connect-btn" onclick="toggleConnection()">Connect</button>
  </div>

  <div class="viewer">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.277A1 1 0 0121 8.6v6.8a1 1 0 01-1.447.877L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
      <p>Enter the signal server URL above<br>and click Connect</p>
    </div>
    <video id="feed" autoplay playsinline></video>
    <div class="hud" id="hud">
      <div class="badge live"><div class="dot"></div> LIVE</div>
      <div class="badge info" id="quality-badge">—</div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <button class="log-toggle" id="log-toggle" onclick="toggleLog()">
        <span class="chevron">▶</span> Diagnostic log
      </button>
      <div class="log-actions">
        <button class="log-clear" onclick="clearLog()">Clear</button>
      </div>
    </div>
    <div class="log-body" id="log-body">
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="sdot" id="sdot"></div>
    <span id="status-text">Disconnected</span>
    <span id="res-info"></span>
  </div>
</div>

<script>
const POLL_MS = 1500;
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
];

let pc = null, pollTimer = null;
let iceIndex = 0, connected = false, offerReceived = false;

// ── Logging ────────────────────────────────────────────────────────────────
function ts() {
  const d = new Date();
  return d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}
function log(msg, cls='') {
  const el = document.getElementById('log');
  const row = document.createElement('div');
  const stamp = document.createElement('span');
  stamp.className = 'ts'; stamp.textContent = ts();
  row.appendChild(stamp);
  if (cls) row.classList.add(cls);
  row.appendChild(document.createTextNode(msg));
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }
function toggleLog() {
  const toggle = document.getElementById('log-toggle');
  const body   = document.getElementById('log-body');
  const open   = body.classList.toggle('open');
  toggle.classList.toggle('open', open);
  if (open) body.querySelector('.log').scrollTop = body.querySelector('.log').scrollHeight;
}

function iceInfo(candidateStr) {
  if (!candidateStr) return { cls: 'dim', label: 'null/end-of-candidates' };
  const parts = candidateStr.split(' ');
  const type  = parts[7];
  const addr  = parts[4] || '?';
  const port  = parts[5] || '?';
  const proto = parts[2] || '?';
  const cls   = type === 'host' ? 'ice-host' : type === 'srflx' ? 'ice-srflx' : type === 'relay' ? 'ice-relay' : 'dim';
  return { cls, label: `[${type}] ${proto} ${addr}:${port}` };
}

function setStatus(state, msg) {
  document.getElementById('sdot').className = 'sdot' + (state ? ' '+state : '');
  document.getElementById('status-text').textContent = msg;
}

// ── Signal server ──────────────────────────────────────────────────────────
function signalUrl() { return document.getElementById('signal-url').value.trim(); }

async function signal(action, body={}) {
  const base = signalUrl();
  if (!base) throw new Error('No signal URL');
  const url = base + '?action=' + encodeURIComponent(action);
  log('→ POST signal/' + action, 'dim');
  let r;
  try {
    r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
  } catch(e) {
    log('  fetch error: ' + e.message, 'err');
    throw e;
  }
  if (!r.ok) {
    const txt = await r.text().catch(() => '(unreadable)');
    log(`  HTTP ${r.status}: ${txt.slice(0,120)}`, 'err');
    throw new Error('HTTP ' + r.status);
  }
  const data = await r.json().catch(async e => {
    log('  JSON parse error: ' + e.message, 'err');
    throw e;
  });
  log('← ' + JSON.stringify(data).slice(0,160), data.ok === false ? 'err' : 'dim');
  return data;
}

// ── Connection flow ────────────────────────────────────────────────────────
function toggleConnection() {
  if (connected || offerReceived) disconnect(); else startConnection();
}

async function startConnection() {
  if (!signalUrl()) { log('Enter signal URL first', 'err'); return; }

  log('=== Starting viewer session ===');
  log('User agent: ' + navigator.userAgent.slice(0,80), 'dim');
  log('STUN: ' + ICE_SERVERS.map(s=>s.urls).join(', '), 'dim');

  document.getElementById('connect-btn').textContent = 'Connecting…';
  setStatus('connecting', 'Polling for host offer…');
  log('Polling for offer every ' + POLL_MS + 'ms…');

  pollTimer = setInterval(tryConnect, POLL_MS);
  tryConnect();
}

async function tryConnect() {
  if (offerReceived) return;

  let offerData;
  try {
    const res = await signal('get_offer');
    if (!res.ok) { log('No offer yet — still waiting…', 'dim'); return; }
    offerData = res.offer;
  } catch(e) {
    log('Signal server error — stopping.', 'err');
    setStatus('error', 'Cannot reach signal server');
    disconnect();
    return;
  }

  offerReceived = true;
  clearInterval(pollTimer);
  pollTimer = null;

  log('Offer received! type=' + offerData.type + ', ' + offerData.sdp.split('\n').length + ' SDP lines', 'ok');
  setStatus('connecting', 'Offer received — building answer…');

  // Build peer connection
  log('Creating RTCPeerConnection…');
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  pc.ontrack = (evt) => {
    log('Track received: kind=' + evt.track.kind + ' id=' + evt.track.id, 'ok');
    const video = document.getElementById('feed');
    if (!video.srcObject) {
      video.srcObject = evt.streams[0];
      log('Stream attached to video element', 'ok');
    }
    video.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('hud').classList.add('visible');
    video.onloadedmetadata = () => {
      const w = video.videoWidth, h = video.videoHeight;
      log('Video metadata: ' + w + 'x' + h, 'ok');
      document.getElementById('quality-badge').textContent = w + '×' + h;
      document.getElementById('res-info').textContent = w + ' × ' + h;
    };
  };

  pc.onicecandidate = async ({ candidate }) => {
    if (!candidate) { log('Local ICE gathering complete', 'dim'); return; }
    const info = iceInfo(candidate.candidate);
    log('Local ICE candidate: ' + info.label, info.cls);
    try {
      await signal('add_ice', {
        candidate: candidate.candidate,
        sdpMid: candidate.sdpMid,
        sdpMLineIndex: candidate.sdpMLineIndex,
        from: 'viewer',
      });
    } catch(e) {
      log('Failed to publish ICE candidate: ' + e.message, 'err');
    }
  };

  pc.onicegatheringstatechange = () => {
    log('ICE gathering state → ' + pc.iceGatheringState,
        pc.iceGatheringState === 'complete' ? 'ok' : 'dim');
  };

  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    log('ICE connection state → ' + s,
        s === 'connected' || s === 'completed' ? 'ok' : s === 'failed' ? 'err' : 'dim');
    if (s === 'failed') {
      log('ICE failed — this usually means NAT traversal blocked. TURN server may be needed.', 'err');
    }
  };

  pc.onsignalingstatechange = () => {
    log('Signaling state → ' + pc.signalingState, 'dim');
  };

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    log('Connection state → ' + s, s === 'connected' ? 'ok' : s === 'failed' ? 'err' : 'dim');
    if (s === 'connected') {
      connected = true;
      setStatus('connected', 'Connected — receiving stream');
      document.getElementById('connect-btn').textContent = 'Disconnect';
      document.getElementById('connect-btn').classList.add('active');
      // Stop ICE polling once connected
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    } else if (s === 'failed') {
      setStatus('error', 'Connection failed — check log for details');
    } else if (s === 'disconnected') {
      setStatus('connecting', 'Host disconnected…');
    }
  };

  // Set offer and create answer
  try {
    log('Setting remote description (offer)…');
    await pc.setRemoteDescription(new RTCSessionDescription(offerData));
    log('Remote description set OK', 'ok');

    log('Creating answer…');
    const answer = await pc.createAnswer();
    log('Answer created (' + answer.sdp.split('\n').length + ' SDP lines)', 'ok');

    await pc.setLocalDescription(answer);
    log('Local description set OK', 'ok');

    await signal('publish_answer', { sdp: answer.sdp, type: answer.type });
    log('Answer published to signal server', 'ok');
  } catch(e) {
    log('SDP negotiation failed: ' + e.name + ': ' + e.message, 'err');
    setStatus('error', 'SDP negotiation failed');
    disconnect();
    return;
  }

  // Poll for host ICE candidates
  iceIndex = 0;
  log('Polling for host ICE candidates…', 'dim');
  pollTimer = setInterval(pollIce, POLL_MS);
}

async function pollIce() {
  try {
    const res = await signal('get_ice', { since: iceIndex, from: 'viewer' });
    if (res.ok && res.candidates && res.candidates.length) {
      log('Received ' + res.candidates.length + ' host ICE candidate(s)', 'ok');
      for (const c of res.candidates) {
        const info = iceInfo(c.candidate);
        log('Adding host ICE: ' + info.label, info.cls);
        try {
          await pc.addIceCandidate(new RTCIceCandidate(c));
          iceIndex = c.id + 1;
        } catch(e) {
          log('addIceCandidate failed: ' + e.message, 'err');
        }
      }
    }
    if (pc && (pc.connectionState === 'connected' || pc.connectionState === 'completed')) {
      clearInterval(pollTimer); pollTimer = null;
      log('ICE polling stopped — connected', 'ok');
    }
  } catch(e) {
    // already logged
  }
}

function disconnect() {
  log('=== Disconnecting ===');
  connected = false; offerReceived = false; iceIndex = 0;
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (pc) { pc.close(); pc = null; log('PeerConnection closed'); }
  const video = document.getElementById('feed');
  video.srcObject = null; video.style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('connect-btn').textContent = 'Connect';
  document.getElementById('connect-btn').classList.remove('active');
  document.getElementById('res-info').textContent = '';
  document.getElementById('quality-badge').textContent = '—';
  setStatus('', 'Disconnected');
}

// ── Init ──────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
if (params.get('signal')) document.getElementById('signal-url').value = params.get('signal');
log('Page loaded. User agent: ' + navigator.userAgent.slice(0,80), 'dim');
</script>
</body>
</html>
